<!DOCTYPE html>
<html lang=pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova tarefa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" href="index.html">Tarefa</a>
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="tarefas.html">Tarefas</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cadastro.html">Nova Tarefa</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Sobre</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5">
        <div class="container">
            <div class="col-md-8 mx-auto">

                <div class="card p-4 shadow-sm">
                    <h3 class="mb-4 text-center fw-bold">Cadastrar Nova Tarefa</h3>

                    <form>

                        <div class="mb-3">
                            <label class="form-label" for="nometarefa">Nome da tarefa</label>
                            <input type="text" class="form-control" placeholder="Digite o nome da tarefa" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="descricaotarefa">Descrição</label>
                            <textarea name="descricao" id="descricao" class="form-control" rows="3" placeholder="Detalhes da tarefa"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="data">Data de entrega</label>
                            <input type="date" class="form-control" name="data" id="data">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="prioridade">Prioridade</label>
                            <select class="form-select">
                                <option selected>Selecione</option>
                                <option>Alta</option>
                                <option>Média</option>
                                <option>Baixa</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="status">Status</label>
                            <div>
                                <input type="radio" name="status"> Pendente
                                <input type="radio" name="status" class="ms-3"> Concluída
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-primary">Salvar tarefa</button>
                            <button type="reset" class="btn btn-warning ms-2">Limpar</button>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </section>

    <footer class="text-center py-3">
        <p class="text-muted mb-0">
            Desenvolvido por Karolaine Ponci • 2026
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
