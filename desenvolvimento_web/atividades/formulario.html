<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Preencha o seguinte formulário</h1>
    <form>
        <h4>Nome e Sobrenome</h4>
        <label for="camponome">Nome:</label>
        <input type="text" id="camponome" placeholder="Digite seu nome" required> <br><br>
        <hr>

        <h4>Sexo</h4>
        <label for="female">Feminino</label>
        <input id="female" type="radio" name="sexo" value="Feminino" required>

        <label for="male">Masculino</label>
        <input id="male" type="radio" name="sexo" value="Masculino" required> <br><br>
        <hr>

        <h4>Escolaridade</h4>
        <select name="escolaridade">
            <option selected disabled value="">Escolha uma opção</option>
            <option value="Ensino Fundamental">Ensino Fundamental</option>
            <option value="Ensino Médio">Ensino Médio</option>
            <option value="Ensino Superior">Ensino Superior</option>
            <option value="Pós-Graduação">Pós-Graduação</option>
        </select>

        <br><br><br><br><br><br><br><br><br>

        <input type="submit" value="Enviar formulário">

    </form>
</body>
</html>
